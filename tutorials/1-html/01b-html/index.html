<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
</head>
<body>
    <div>
    <img src="images/dog.jpg" alt="My dog">
    </div>
    <div>
    <img src="images/dog.jpg" alt="My dog">
    </div>

    <h2>Responsive images using srcset  </h2>
<img src="images/dog-fallback.jpg" width="800" 
alt="dog picture" 
srcset="images/dog-640.jpg 640w,
images/dog-1280.jpg 1280w,
images/dog-1920.jpg 1920w">

</body>
</html>
