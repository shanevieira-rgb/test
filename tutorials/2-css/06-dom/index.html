<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom + JS></title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

        <h1 id="header">Hats!</h1>
        <button id="change-header-button">🎩</button>

    <main>

        <img src="images/tophat.png" alt="Top Hat" class="hidden" id="img2">
        <img src="images/bowler.png" alt="Bowler Hat" class="hidden" id="img3">

    </main>


    <script src="js/main.js"></script>
</body>
</html>
